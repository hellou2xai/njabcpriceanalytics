<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bottleFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a2a52"/>
      <stop offset="100%" stop-color="#0a8080"/>
    </linearGradient>
  </defs>

  <!-- Bottle outline -->
  <g fill="none" stroke="#0a2a52" stroke-width="14" stroke-linejoin="round" stroke-linecap="round">
    <path d="M212 132
             L212 96 Q212 88 220 88 L292 88 Q300 88 300 96 L300 132
             Q300 150 314 176
             Q336 214 336 268
             L336 420 Q336 436 320 436
             L192 436 Q176 436 176 420
             L176 268 Q176 214 198 176
             Q212 150 212 132 Z"/>
  </g>

  <!-- Inner content clipped to bottle body -->
  <clipPath id="bodyClip">
    <path d="M212 132 L212 96 Q212 88 220 88 L292 88 Q300 88 300 96 L300 132
             Q300 150 314 176 Q336 214 336 268 L336 420 Q336 436 320 436
             L192 436 Q176 436 176 420 L176 268 Q176 214 198 176 Q212 150 212 132 Z"/>
  </clipPath>

  <g clip-path="url(#bodyClip)">
    <!-- Bar chart -->
    <rect x="208" y="372" width="22" height="56" rx="3" fill="#0a8080"/>
    <rect x="240" y="344" width="22" height="84" rx="3" fill="#0a2a52"/>
    <rect x="272" y="308" width="22" height="120" rx="3" fill="#0a8080"/>

    <!-- Growth arrow -->
    <g fill="none" stroke="#0a8080" stroke-width="12" stroke-linecap="round" stroke-linejoin="round">
      <path d="M204 360 L236 332 L266 344 L304 300"/>
    </g>
    <path d="M306 296 l4 -26 l-26 8 z" fill="#0a8080"/>

    <!-- Network nodes (upper body) -->
    <g stroke="#0a8080" stroke-width="7">
      <line x1="256" y1="186" x2="224" y2="222"/>
      <line x1="256" y1="186" x2="292" y2="216"/>
      <line x1="224" y1="222" x2="240" y2="266"/>
      <line x1="292" y1="216" x2="284" y2="260"/>
    </g>
    <g fill="#fff" stroke="#0a8080" stroke-width="7">
      <circle cx="256" cy="186" r="11"/>
      <circle cx="224" cy="222" r="11"/>
      <circle cx="292" cy="216" r="11"/>
      <circle cx="240" cy="266" r="11"/>
      <circle cx="284" cy="260" r="11"/>
    </g>
  </g>

  <!-- Cork / neck top -->
  <rect x="214" y="80" width="84" height="20" rx="8" fill="#0a2a52"/>

  <!-- Rising coins/bubbles from the neck -->
  <g>
    <circle cx="276" cy="58" r="22" fill="none" stroke="#c0822e" stroke-width="9"/>
    <text x="276" y="68" font-family="Arial, sans-serif" font-size="26" font-weight="bold" fill="#c0822e" text-anchor="middle">$</text>
    <circle cx="232" cy="42" r="17" fill="none" stroke="#c0822e" stroke-width="8"/>
    <g stroke="#c0822e" stroke-width="6" stroke-linecap="round">
      <line x1="232" y1="42" x2="232" y2="33"/>
      <line x1="232" y1="42" x2="240" y2="46"/>
    </g>
    <circle cx="248" cy="80" r="6" fill="#c0822e"/>
    <circle cx="300" cy="92" r="5" fill="#c0822e"/>
  </g>

  <!-- Circuit traces left (teal) -->
  <g fill="none" stroke="#0a8080" stroke-width="9" stroke-linecap="round" stroke-linejoin="round">
    <path d="M176 392 L150 392 L150 424 L120 424"/>
    <path d="M176 414 L138 414 L138 446"/>
  </g>
  <g fill="#fff" stroke="#0a8080" stroke-width="8">
    <circle cx="112" cy="424" r="9"/>
    <circle cx="138" cy="454" r="9"/>
  </g>

  <!-- Circuit traces right (gold) -->
  <g fill="none" stroke="#c0822e" stroke-width="9" stroke-linecap="round" stroke-linejoin="round">
    <path d="M336 392 L362 392 L362 424 L392 424"/>
    <path d="M336 414 L374 414 L374 446"/>
  </g>
  <g fill="#fff" stroke="#c0822e" stroke-width="8">
    <circle cx="400" cy="424" r="9"/>
    <circle cx="374" cy="454" r="9"/>
  </g>
</svg>
