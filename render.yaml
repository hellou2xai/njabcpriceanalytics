# Render Blueprint: one managed Postgres + one Docker web service that serves
# the API and the built React frontend from the same origin.
# https://render.com/docs/blueprint-spec
#
# Pricing data is loaded into Postgres locally (scripts/ingest_to_postgres.py)
# and materialised into a local DuckDB cache at boot. User data lives in the
# same Postgres. See the migration runbook for the monthly cycle.

databases:
  - name: njabc-db
    databaseName: celr
    user: celr
    # Live plan is Pro 4 GB (4 GB RAM / 1 CPU), confirmed in the dashboard. This
    # previously read 'free' (blueprint drift) — a sync would have downgraded the
    # production database. Keep matching the dashboard.
    plan: pro_4gb         # Pro 4 GB RAM / 1 CPU

services:
  - type: web
    name: njabc-price-analytics
    runtime: docker
    # Live plan is Pro (2 CPU / 4 GB), confirmed in the dashboard. This previously
    # read 'free' (blueprint drift) — a sync would have downgraded prod to a
    # 512 MB free dyno. Keep this matching the dashboard.
    plan: pro             # Pro: 2 CPU / 4 GB
    dockerfilePath: ./Dockerfile
    # Readiness probe (returns 503 until the pricing cache is built). Render
    # waits for this to return 200 before routing traffic to a newly deployed
    # instance, so the OLD instance keeps serving users until the NEW one is
    # ready. This is what gives us zero-downtime deploys instead of a 1-2 min
    # gap where the new container 500s while the cache copies from Postgres.
    healthCheckPath: /api/ready
    autoDeploy: true
    # Persistent disk for the DuckDB pricing cache. Without it the cache dir is
    # ephemeral, so EVERY deploy rebuilds the whole cache at boot -- including the
    # ~10-15 min deal_grid build -- and deal_grid is absent until it finishes. With
    # the disk the built cache (deal_grid included) survives deploys: boot adopts it
    # via the pointer in seconds and only a monthly data reload rebuilds it.
    # NOTE: a service with a disk runs a SINGLE instance (Render can't share a disk
    # across instances) -- fine here (each instance builds its own cache anyway).
    disk:
      name: pricing-cache
      mountPath: /var/data
      sizeGB: 10
    envVars:
      - key: CELR_CACHE_DIR
        value: /var/data
      - key: DATABASE_URL
        fromDatabase:
          name: njabc-db
          property: connectionString
      - key: PRICING_SOURCE
        value: postgres
      # Secrets: set these in the Render dashboard (sync:false keeps them out of
      # the repo). All optional; the related feature is disabled if unset.
      # ANTHROPIC_API_KEY also powers the smarter-search fallback: when a Catalog
      # search finds nothing, the backend asks Claude to translate the shorthand and
      # retries once. Stays off until a value is set. Model below (defaults to Sonnet).
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: CELR_SEARCH_AI_MODEL
        value: claude-sonnet-4-6
      # --- AI layer (backend/llm_client.py seam + claude-agent-sdk) ---
      # Rollout flag for the Agent SDK path (main assistant + procurement agents).
      # Default 0 = keep the existing raw-API loops (safe to deploy the dormant
      # CLI). Flip to 1 ONLY AFTER raising the web instance to Pro Plus
      # (4 CPU / 8 GB) in the dashboard — an agent run spawns a `claude`
      # subprocess on top of the DuckDB pool budget that already fills ~4 GB.
      - key: CELR_USE_AGENT_SDK
        value: "0"
      # Bounds concurrent agent subprocesses (each ~ a Node/CLI process). The
      # cron fan-out spawns one thread per user, so this is the OOM guard. Raise
      # only with the bigger instance.
      - key: CELR_AGENT_MAX_CONCURRENCY
        value: "1"
      # Provider for the single-shot path (catalog query / search / blurbs).
      # 'anthropic' today; 'openrouter' uses the Anthropic-compatible endpoint
      # below (the agent path stays Claude-only regardless).
      - key: CELR_LLM_PROVIDER
        value: anthropic
      - key: OPENROUTER_BASE_URL
        value: https://openrouter.ai/api/v1
      - key: OPENROUTER_API_KEY
        sync: false           # inert until CELR_LLM_PROVIDER=openrouter
      - key: GOOGLE_MAPS_API_KEY
        sync: false
      - key: SERPAPI_API_KEY
        sync: false
      # Email (Resend). Leave RESEND_API_KEY blank to keep email off (signups
      # auto-activate). Set it to turn on welcome/activation/reset emails AND
      # enforce email verification before login.
      - key: RESEND_API_KEY
        sync: false
      - key: MAIL_FROM
        sync: false           # e.g. "CELR <noreply@celr.ai>" (verified Resend domain)
      - key: APP_BASE_URL
        value: https://nj.celr.ai
      # Shared secret for the nightly alert refresh. Set the SAME value here and
      # as a GitHub Actions repo secret named CRON_SECRET; the scheduled workflow
      # posts it to /api/alerts/regenerate-all at 12:01 AM Eastern.
      - key: CRON_SECRET
        sync: false
      # Product enrichment (Go-UPC lookups + images in Cloudflare R2). All
      # optional; enrichment and images are skipped if unset. The S3 endpoint is
      # derived from R2_ACCOUNT_ID. R2_PUBLIC_BASE_URL is the bucket's public
      # base (custom domain or r2.dev URL), used to build served image URLs.
      - key: GO_UPC_API_KEY
        sync: false
      - key: R2_ACCOUNT_ID
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET
        sync: false
      - key: R2_PUBLIC_BASE_URL
        sync: false
